<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 English Vocabulary</title>
<style>
:root {
  --bg: #f0f2f5; --card: #fff; --text: #1a1a1a; --sub: #777;
  --accent: #3b82f6; --accent-light: #eff6ff; --border: #e5e7eb;
  --pos-bg: #3b82f6; --pos-text: #fff; --note: #9ca3af;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 20px 10px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
.hrow1 { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
h1 { font-size: 1.3rem; font-weight: 800; }
.badge { background: var(--accent-light); color: var(--accent); font-size: .78rem; font-weight: 600; padding: 2px 10px; border-radius: 20px; }
#search { width: 100%; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .2s; }
#search:focus { border-color: var(--accent); }
nav { background: #fff; border-bottom: 1px solid var(--border); padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 4px; position: sticky; top: 93px; z-index: 199; }
nav a { display: inline-flex; align-items: center; justify-content: center; width: 27px; height: 27px; border-radius: 6px; font-size: .8rem; font-weight: 700; color: var(--accent); background: var(--accent-light); text-decoration: none; transition: all .15s; }
nav a:hover { background: var(--accent); color: #fff; }
main { max-width: 780px; margin: 0 auto; padding: 20px 14px 40px; }
.section { margin-bottom: 28px; }
.sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.letter-box { width: 34px; height: 34px; background: var(--accent); color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; flex-shrink: 0; }
.sec-count { font-size: .8rem; color: var(--sub); }
.entry { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; transition: box-shadow .2s; }
.entry:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.erow1 { display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
.word { font-size: 1.1rem; font-weight: 700; }
.word a { color: inherit; text-decoration: none; }
.word a:hover { color: var(--accent); }
.ipa { font-size: .88rem; color: var(--sub); font-family: serif; }
.pos { font-size: .75rem; background: var(--pos-bg); color: var(--pos-text); padding: 2px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
.cam-link { font-size: .8rem; color: var(--accent); text-decoration: none; opacity: .7; margin-left: auto; white-space: nowrap; }
.cam-link:hover { opacity: 1; }
.meaning { font-size: .92rem; font-weight: 500; color: #374151; margin: 6px 0 10px; }
.examples { list-style: none; }
.ex-item { display: flex; align-items: flex-start; gap: 7px; padding: 5px 0; border-top: 1px solid var(--border); font-size: .9rem; color: #4b5563; }
.ex-item:first-child { border-top: none; }
.ex-dot { color: var(--accent); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.ex-text { flex: 1; }
.sp-btn { background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: .75rem; padding: 2px 5px; color: var(--sub); flex-shrink: 0; transition: all .15s; line-height: 1.4; }
.sp-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.sp-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.note { font-size: .82rem; color: var(--note); font-style: italic; margin-top: 8px; padding-top: 7px; border-top: 1px dashed var(--border); }
.empty { text-align: center; color: var(--sub); padding: 60px 20px; font-size: 1.05rem; }
.ex-item.clickable { cursor: pointer; }
.ex-item.clickable:hover { background: #f8fafc; border-radius: 6px; }
.ex-body { flex: 1; min-width: 0; }
.ex-row { display: flex; align-items: flex-start; gap: 7px; }
.ex-detail { margin-top: 8px; padding: 10px 12px; background: #fffbeb; border-left: 3px solid #fbbf24; border-radius: 0 8px 8px 0; font-size: .85rem; line-height: 1.6; }
.ex-ko { color: #1e40af; font-weight: 600; margin-bottom: 5px; }
.ex-str { color: #4b5563; white-space: pre-wrap; }

/* ── Quiz Overlay ── */
#quiz-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
  z-index: 1000; align-items: center; justify-content: center; padding: 16px;
}
#quiz-overlay.open { display: flex; }
#quiz-card {
  background: #fff; border-radius: 20px; width: 100%; max-width: 560px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
  display: flex; flex-direction: column;
}
#quiz-header {
  background: var(--accent); color: #fff; padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
#quiz-header h2 { font-size: 1rem; font-weight: 700; }
#quiz-counter { font-size: .83rem; opacity: .85; }
#quiz-close {
  background: rgba(255,255,255,.2); border: none; color: #fff;
  border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: .85rem;
}
#quiz-close:hover { background: rgba(255,255,255,.35); }
#quiz-body { padding: 28px 24px 20px; }
#quiz-word {
  font-size: 2rem; font-weight: 800; color: var(--text);
  margin-bottom: 4px; word-break: break-word;
}
#quiz-pos {
  display: inline-block; font-size: .78rem; background: var(--pos-bg);
  color: var(--pos-text); padding: 2px 9px; border-radius: 4px;
  font-weight: 600; margin-bottom: 18px;
}
#quiz-reveal-btn {
  width: 100%; padding: 12px; border: 2px dashed var(--accent);
  border-radius: 10px; background: var(--accent-light); color: var(--accent);
  font-size: .95rem; font-weight: 600; cursor: pointer; transition: all .18s;
}
#quiz-reveal-btn:hover { background: var(--accent); color: #fff; border-style: solid; }
#quiz-answer { display: none; margin-top: 16px; }
#quiz-meaning {
  font-size: 1.05rem; font-weight: 600; color: #1e40af;
  background: #eff6ff; padding: 12px 14px; border-radius: 10px;
  margin-bottom: 10px; line-height: 1.5;
}
#quiz-ipa { font-size: .9rem; color: var(--sub); font-family: serif; margin-bottom: 10px; }
#quiz-examples { list-style: none; }
#quiz-examples li {
  font-size: .88rem; color: #4b5563; padding: 5px 0;
  border-top: 1px solid var(--border); display: flex; gap: 7px;
}
#quiz-examples li:first-child { border-top: none; }
#quiz-footer {
  padding: 16px 24px 20px; display: flex; gap: 10px; border-top: 1px solid var(--border);
}
#quiz-next-btn {
  flex: 1; padding: 12px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
#quiz-next-btn:hover { opacity: .88; }
#quiz-prog {
  width: 100%; height: 4px; background: var(--border);
}
#quiz-prog-bar {
  height: 4px; background: var(--accent); transition: width .3s;
}
</style>
</head>
<body>
<header>
  <div class="hrow1">
    <h1>📚 English Vocabulary</h1>
    <span class="badge" id="cnt"></span>
    <button onclick="quizOpen()" style="margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;">🎯 Quiz</button>
  </div>
  <input id="search" type="text" placeholder="단어 검색… (영어 또는 한국어)">
</header>

<!-- Quiz Overlay -->
<div id="quiz-overlay">
  <div id="quiz-card">
    <div id="quiz-prog"><div id="quiz-prog-bar" style="width:0%"></div></div>
    <div id="quiz-header">
      <h2>🎯 단어 퀴즈</h2>
      <span id="quiz-counter"></span>
      <button id="quiz-close" onclick="quizClose()">✕ 닫기</button>
    </div>
    <div id="quiz-body">
      <div id="quiz-word"></div>
      <div id="quiz-pos"></div>
      <button id="quiz-reveal-btn" onclick="quizReveal()">👆 의미 보기</button>
      <div id="quiz-answer">
        <div id="quiz-ipa"></div>
        <div id="quiz-meaning"></div>
        <ul id="quiz-examples"></ul>
      </div>
    </div>
    <div id="quiz-footer">
      <button id="quiz-next-btn" onclick="quizNext()">다음 단어 →</button>
    </div>
  </div>
</div>

<nav id="anav"></nav>
<main id="main"></main>

  {w:"acknowledge",i:"/əkˈnɒlɪdʒ/",p:"v. [T]",m:"인정하다, 인식하다; 감사를 표하다",c:"acknowledge",

   ]},
  {w:"adjust",i:"/əˈdʒʌst/",p:"v. [I/T]",m:"조정하다, 맞추다; 적응하다",c:"adjust",

// ── Render ──────────────────────────────────────────
function letter(entry){ return entry.w[0].toUpperCase(); }

function camUrl(e){
  if(e.u) return e.u;
  if(e.c) return C + e.c;
  return null;
}

let activeSpeakBtn = null;

document.addEventListener('click', function(ev){
  const btn = ev.target.closest('.sp-btn');
  if(!btn){
    const item = ev.target.closest('.ex-item.clickable');
    if(item){
      const det = item.querySelector('.ex-detail');
      det.style.display = det.style.display === 'none' ? 'block' : 'none';
    }
    return;
  }
  const text = btn.dataset.text;
  if(window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    if(activeSpeakBtn){ activeSpeakBtn.classList.remove('on'); activeSpeakBtn.textContent='🔊'; }
    if(activeSpeakBtn === btn){ activeSpeakBtn = null; return; }
  }
  activeSpeakBtn = btn;
  btn.classList.add('on'); btn.textContent='■';
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US'; utt.rate = 0.88;
  utt.onend = utt.onerror = ()=>{ btn.classList.remove('on'); btn.textContent='🔊'; activeSpeakBtn=null; };
  window.speechSynthesis.speak(utt);
});

function entryHTML(e){
  const url = camUrl(e);
  const wordSpan = url
    ? `<span class="word"><a href="${url}" target="_blank">${e.w}</a></span>`
    : `<span class="word">${e.w}</span>`;
  const ipa = e.i ? `<span class="ipa">${e.i}</span>` : '';
  const camLink = url ? `<a class="cam-link" href="${url}" target="_blank">🔊 발음</a>` : '';
  const exItems = e.e.map((ex,i)=>{
    const det = e.x && e.x[i];
    const detHTML = det ? `<div class="ex-detail" style="display:none"><div class="ex-ko">${det.k}</div><div class="ex-str">${det.s}</div></div>` : '';
    return `
    <li class="ex-item${det?' clickable':''}">
      <span class="ex-dot">›</span>
      <div class="ex-body">
        <div class="ex-row">
          <span class="ex-text">${ex}</span>
          <button class="sp-btn" data-text="${ex.replace(/"/g,'&quot;')}">🔊</button>
        </div>
        ${detHTML}
      </div>
    </li>`;
  }).join('');
  const note = e.n ? `<div class="note">${e.n}</div>` : '';
  return `
  <div class="entry" data-w="${e.w.toLowerCase()}" data-m="${e.m.toLowerCase()}">
    <div class="erow1">${wordSpan}${ipa}<span class="pos">${e.p}</span>${camLink}</div>
    <div class="meaning">${e.m}</div>
    <ul class="examples">${exItems}</ul>
    ${note}
  </div>`;
}

function render(data){
  const groups = {};
  data.forEach(e=>{ const l=letter(e); (groups[l]=groups[l]||[]).push(e); });
  const letters = Object.keys(groups).sort();

  document.getElementById('cnt').textContent = data.length + '개';
  document.getElementById('anav').innerHTML = letters.map(l=>
    `<a href="#L${l}">${l}</a>`).join('');

  const main = document.getElementById('main');
  if(!data.length){ main.innerHTML='<div class="empty">검색 결과가 없어요 😅</div>'; return; }
  main.innerHTML = letters.map(l=>`
    <section class="section" id="L${l}">
      <div class="sec-head">
        <div class="letter-box">${l}</div>
        <span class="sec-count">${groups[l].length}개</span>
      </div>
      ${groups[l].map(entryHTML).join('')}
    </section>`).join('');
}

document.getElementById('search').addEventListener('input', function(){
  const q = this.value.toLowerCase().trim();
  if(!q){ render(V); return; }
  render(V.filter(e=>
    e.w.toLowerCase().includes(q) ||
    e.m.toLowerCase().includes(q) ||
    (e.i||'').includes(q) ||
    e.e.some(x=>x.toLowerCase().includes(q))
  ));
});

render(V);

// ── Quiz ──────────────────────────────────────────────────────────────────
(function(){
  let deck = [], idx = 0, seen = 0;

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  window.quizOpen = function(){
    deck = shuffle(V);
    idx = 0; seen = 0;
    document.getElementById('quiz-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    showCard();
  };

  window.quizClose = function(){
    document.getElementById('quiz-overlay').classList.remove('open');
    document.body.style.overflow = '';
    window.speechSynthesis && window.speechSynthesis.cancel();
  };

  window.quizReveal = function(){
    document.getElementById('quiz-reveal-btn').style.display = 'none';
    document.getElementById('quiz-answer').style.display = 'block';
    document.getElementById('quiz-next-btn').textContent = '다음 단어 →';
  };

  window.quizNext = function(){
    idx = (idx + 1) % deck.length;
    if(idx === 0) deck = shuffle(V); // reshuffle after full cycle
    seen = Math.min(seen + 1, deck.length);
    showCard();
  };

  function showCard(){
    const e = deck[idx];
    window.speechSynthesis && window.speechSynthesis.cancel();

    document.getElementById('quiz-word').textContent = e.w;
    document.getElementById('quiz-pos').textContent = e.p;
    document.getElementById('quiz-ipa').textContent = e.i || '';
    document.getElementById('quiz-meaning').textContent = e.m;

    const ul = document.getElementById('quiz-examples');
    ul.innerHTML = (e.e||[]).map(ex =>
      `<li><span style="color:var(--accent);font-weight:700;flex-shrink:0">›</span> ${ex}</li>`
    ).join('');

    document.getElementById('quiz-reveal-btn').style.display = 'block';
    document.getElementById('quiz-answer').style.display = 'none';
    document.getElementById('quiz-next-btn').textContent = '건너뛰기 →';

    const pct = Math.round((seen / deck.length) * 100);
    document.getElementById('quiz-prog-bar').style.width = pct + '%';
    document.getElementById('quiz-counter').textContent = seen + ' / ' + deck.length;
  }

  // close on overlay background click
  document.getElementById('quiz-overlay').addEventListener('click', function(e){
    if(e.target === this) quizClose();
  });

  // keyboard shortcut: Space = reveal / next, Esc = close
  document.addEventListener('keydown', function(e){
    if(!document.getElementById('quiz-overlay').classList.contains('open')) return;
    if(e.key === 'Escape'){ quizClose(); return; }
    if(e.key === ' ' || e.key === 'ArrowRight'){
      e.preventDefault();
      const ans = document.getElementById('quiz-answer');
      if(ans.style.display === 'none') quizReveal();
      else quizNext();
    }
  });
})();
</script>
</body>
</html>
