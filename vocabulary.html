<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 English Vocabulary</title>
<style>
:root {
  --bg: #f0f2f5; --card: #fff; --text: #1a1a1a; --sub: #777;
  --accent: #3b82f6; --accent-light: #eff6ff; --border: #e5e7eb;
  --pos-bg: #3b82f6; --pos-text: #fff; --note: #9ca3af;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 20px 10px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
.hrow1 { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
h1 { font-size: 1.3rem; font-weight: 800; }
.badge { background: var(--accent-light); color: var(--accent); font-size: .78rem; font-weight: 600; padding: 2px 10px; border-radius: 20px; }
#search { width: 100%; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .2s; }
#search:focus { border-color: var(--accent); }
nav { background: #fff; border-bottom: 1px solid var(--border); padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 4px; position: sticky; top: 93px; z-index: 199; }
nav a { display: inline-flex; align-items: center; justify-content: center; width: 27px; height: 27px; border-radius: 6px; font-size: .8rem; font-weight: 700; color: var(--accent); background: var(--accent-light); text-decoration: none; transition: all .15s; }
nav a:hover { background: var(--accent); color: #fff; }
main { max-width: 780px; margin: 0 auto; padding: 20px 14px 40px; }
.section { margin-bottom: 28px; }
.sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.letter-box { width: 34px; height: 34px; background: var(--accent); color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; flex-shrink: 0; }
.sec-count { font-size: .8rem; color: var(--sub); }
.entry { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; transition: box-shadow .2s; }
.entry:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.erow1 { display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
.word { font-size: 1.1rem; font-weight: 700; }
.word a { color: inherit; text-decoration: none; }
.word a:hover { color: var(--accent); }
.ipa { font-size: .88rem; color: var(--sub); font-family: serif; }
.pos { font-size: .75rem; background: var(--pos-bg); color: var(--pos-text); padding: 2px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
.cam-link { font-size: .8rem; color: var(--accent); text-decoration: none; opacity: .7; margin-left: auto; white-space: nowrap; }
.cam-link:hover { opacity: 1; }
.meaning { font-size: .92rem; font-weight: 500; color: #374151; margin: 6px 0 10px; }
.examples { list-style: none; }
.ex-item { display: flex; align-items: flex-start; gap: 7px; padding: 5px 0; border-top: 1px solid var(--border); font-size: .9rem; color: #4b5563; }
.ex-item:first-child { border-top: none; }
.ex-dot { color: var(--accent); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.ex-text { flex: 1; }
.sp-btn { background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: .75rem; padding: 2px 5px; color: var(--sub); flex-shrink: 0; transition: all .15s; line-height: 1.4; }
.sp-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.sp-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.note { font-size: .82rem; color: var(--note); font-style: italic; margin-top: 8px; padding-top: 7px; border-top: 1px dashed var(--border); }
.empty { text-align: center; color: var(--sub); padding: 60px 20px; font-size: 1.05rem; }
.ex-item.clickable { cursor: pointer; }
.ex-item.clickable:hover { background: #f8fafc; border-radius: 6px; }
.ex-body { flex: 1; min-width: 0; }
.ex-row { display: flex; align-items: flex-start; gap: 7px; }
.ex-detail { margin-top: 8px; padding: 10px 12px; background: #fffbeb; border-left: 3px solid #fbbf24; border-radius: 0 8px 8px 0; font-size: .85rem; line-height: 1.6; }
.ex-ko { color: #1e40af; font-weight: 600; margin-bottom: 5px; }
.ex-str { color: #4b5563; white-space: pre-wrap; }
</style>
</head>
<body>
<header>
  <div class="hrow1"><h1>📚 English Vocabulary</h1><span class="badge" id="cnt"></span></div>
  <input id="search" type="text" placeholder="단어 검색… (영어 또는 한국어)">
</header>
<nav id="anav"></nav>
<main id="main"></main>

<script>
const C = 'https://dictionary.cambridge.org/dictionary/english/';
const MW = 'https://www.merriam-webster.com/dictionary/';

const V = [
  // A
  {w:"adjust",i:"/əˈdʒʌst/",p:"v. [I/T]",m:"조정하다, 맞추다; 적응하다",c:"adjust",
   e:["It took me a while to adjust to the new schedule.","You can adjust the seat to your height."],
   x:[
     {k:"새 일정에 적응하는 데 시간이 좀 걸렸어.",s:"It (가주어) + took + me (간목) + a while (진목) / to adjust to the new schedule (진주어)\n→ 'It takes [사람] a while to V' = ~하는 데 시간이 좀 걸리다\n→ adjust to ~ = ~에 적응하다 [자동사]"},
     {k:"시트를 네 키에 맞게 조정할 수 있어.",s:"You (주어) + can adjust (조동사+동사) + the seat (목적어) + to your height (전치사구)\n→ 'adjust A to B' = A를 B에 맞게 조정하다 [타동사]\n→ to your height = 네 키에 맞게"}
   ]},
  {w:"adjourn",i:"/əˈdʒɜːrn/",p:"v. [I/T]",m:"(회의·재판을) 휴정하다, 중단하다, 연기하다",c:"adjourn",
   e:["The court will adjourn until tomorrow morning.","The meeting was adjourned due to lack of quorum."],
   x:[
     {k:"법원은 내일 아침까지 휴정할 것이다.",s:"The court (주어) + will adjourn (미래조동사+자동사) + until tomorrow morning (전치사구)\n→ adjourn [I] = 휴정하다, 자동사로 목적어 불필요\n→ until ~ = ~까지"},
     {k:"회의는 의결 정족수 부족으로 중단됐다.",s:"The meeting (주어) + was adjourned (수동태) + due to lack of quorum (이유 전치사구)\n→ due to ~ = ~ 때문에\n→ lack of quorum = 정족수(quorum) 부족"}
   ]},
  {w:"appropriate",i:"/əˈproʊpriɪt/",p:"adj.",m:"적절한, 알맞은",c:"appropriate",
   e:["That kind of language is not appropriate in the classroom.","Make sure you wear appropriate clothing for the interview."],
   x:[
     {k:"그런 종류의 말은 교실에서 적절하지 않아.",s:"That kind of language (주어) + is not appropriate (be동사+부정+형용사) + in the classroom (장소 전치사구)\n→ 'not appropriate' = 부적절한\n→ That kind of ~ = 그런 종류의 ~"},
     {k:"면접에 적합한 복장을 꼭 갖춰 입어.",s:"Make sure (명령문+접속사) + you wear (주어+동사) + appropriate clothing (형용사+명사) + for the interview (전치사구)\n→ 'Make sure (that) S+V' = 반드시 ~해라\n→ appropriate clothing = 적절한 복장"}
   ]},
  // B
  {w:"benefactor",i:"/ˈbɛnɪfæktər/",p:"n. [C]",m:"후원자, 은인",c:"benefactor",
   e:["An anonymous benefactor donated a million dollars to the school.","Without the benefactor's support, the project would never have happened."],
   x:[
     {k:"한 익명의 후원자가 학교에 백만 달러를 기부했다.",s:"An anonymous benefactor (주어) + donated (동사) + a million dollars (직접목적어) + to the school (간접목적어)\n→ donate A to B = B에 A를 기부하다\n→ anonymous = 익명의"},
     {k:"후원자의 지원 없이는 그 프로젝트는 절대 이뤄지지 않았을 것이다.",s:"Without the benefactor's support (가정 전치사구 = if절 대용) + the project would never have happened (주절, 가정법 과거완료)\n→ Without ~ = ~이 없었다면 (= If it had not been for ~)\n→ would never have happened = 절대 일어나지 않았을 것이다"}
   ]},
  {w:"bailiff",i:"/ˈbeɪlɪf/",p:"n. [C]",m:"법원 집행관 (법정 질서 유지 및 판사 보좌)",c:"bailiff",

   x:[
     {k:"판사가 입장하자 집행관이 모두에게 기립을 요청했다.",s:"The bailiff (주어) + asked (동사) + everyone (목적어) + to rise (to부정사, 목적격 보어) + as the judge entered (접속사절)\n→ 'ask + 목적어 + to V' = ~에게 V하도록 요청하다\n→ as = ~할 때, ~하자 (시간 접속사)"},
     {k:"집행관이 피고를 법정 밖으로 호송했다.",s:"The bailiff (주어) + escorted (동사) + the defendant (목적어) + out of the courtroom (방향 전치사구)\n→ escort = 호위·호송하다\n→ out of ~ = ~ 밖으로"}
   ]},
  {w:"blood vessel",i:"/blʌd ˈvɛs.əl/",p:"n. [C]",m:"혈관",c:"blood-vessel",

   x:[
     {k:"눈에 혈관이 터져서 빨갛게 보였다.",s:"A burst blood vessel in his eye (주어) + made (동사) + it (목적어) + look red (목적격 보어)\n→ 'make + 목적어 + 동사원형' = ~가 …하게 만들다\n→ burst blood vessel = 터진 혈관"},
     {k:"운동은 심장과 혈관을 강화시킨다.",s:"Exercise (주어) + strengthens (동사) + the heart and blood vessels (목적어, 등위접속 명사구)\n→ strengthen = 강화하다 [타동사]\n→ and로 heart와 blood vessels를 병렬 연결"}
   ]},
  {w:"bleachers",i:"/ˈbliːtʃərz/",p:"n. [plural]",m:"(지붕 없는 야외) 관중석, 스탠드 — 항상 복수형",c:"bleachers",
   e:["We sat in the bleachers and watched the whole game.","The bleachers were packed with cheering fans."],
   x:[
     {k:"우리는 스탠드에 앉아서 경기를 처음부터 끝까지 봤어.",s:"We (주어) + sat in the bleachers (동사구) + and watched the whole game (등위절)\n→ and로 두 동사구를 병렬 연결\n→ the whole game = 경기 전체"},
     {k:"스탠드는 응원하는 팬들로 가득 찼다.",s:"The bleachers (주어) + were packed (수동태) + with cheering fans (전치사구)\n→ be packed with ~ = ~로 빽빽이 들어차다\n→ cheering = 응원하는 (현재분사, 형용사 역할)"}
   ]},
  {w:"bogart",i:"/ˈboʊɡɑːrt/",p:"v. [T]",m:"(속어) 독차지하다, 혼자 다 쓰다",u:MW+"bogart",
   e:["Stop bogarting the remote — let someone else choose.","Don't bogart all the snacks; leave some for the rest of us."],
   x:[
     {k:"리모컨 혼자 독차지하지 마 — 다른 사람도 고르게 해줘.",s:"Stop bogarting the remote (명령문, stop+동명사) + let someone else choose (명령문, let+목적어+동사원형)\n→ 'stop + V-ing' = ~하는 것을 멈추다\n→ 'let + 목적어 + 동사원형' = ~가 …하게 하다"},
     {k:"과자 다 혼자 먹지 마; 나머지 사람들 것도 좀 남겨.",s:"Don't bogart all the snacks (부정 명령문) ; leave some for the rest of us (명령문)\n→ Don't + 동사원형 = ~하지 마라\n→ the rest of us = 우리 나머지 사람들"}
   ]},
  {w:"bully",i:"/ˈbʊli/",p:"n. [C]",m:"괴롭히는 사람, 불량배",c:"bully",
   e:["He was a bully who terrorized the younger kids at school.","Don't let the bullies win — stand up for yourself."],
   x:[
     {k:"그는 학교에서 어린 애들을 공포에 떨게 한 불량배였어.",s:"He (주어) + was (동사) + a bully (보어) + who terrorized the younger kids at school (관계절)\n→ who절 = a bully를 수식하는 관계대명사절\n→ terrorize = 공포에 떨게 하다"},
     {k:"불량배들이 이기게 놔두지 마 — 당당히 맞서.",s:"Don't let the bullies win (부정 명령, let+목적어+동사원형) — stand up for yourself (명령문)\n→ stand up for ~ = ~를 위해 당당히 맞서다\n→ yourself = 너 자신"}
   ]},
  {w:"bust",i:"/bʌst/",p:"v. [T]",m:"부수다; (속어) 체포하다; 망하게 하다",c:"bust",n:"cf. go bust (파산하다)",
   e:["He busted the door open with his shoulder.","The police busted him for drug possession."],
   x:[
     {k:"그는 어깨로 문을 부수고 들어갔다.",s:"He (주어) + busted (동사) + the door (목적어) + open (결과 형용사) + with his shoulder (수단 전치사구)\n→ 'bust + 목적어 + open' = ~을 부수어 열다\n→ with his shoulder = 어깨로"},
     {k:"경찰은 마약 소지 혐의로 그를 체포했다.",s:"The police (주어) + busted (동사) + him (목적어) + for drug possession (이유 전치사구)\n→ bust = (속어) 체포하다 = arrest\n→ for ~ = ~ 때문에, ~ 혐의로"}
   ]},
  // C
  {w:"call sb names",p:"phrv. [T]",m:"~에게 욕하다, 험한 말을 하다",c:"call-someone-names",
   e:["Stop calling me names — it's not funny.","The kids were calling her names on the playground."],
   x:[
     {k:"나한테 욕하지 마 — 하나도 안 웃겨.",s:"Stop calling me names (명령문, stop+동명사) — it's not funny (보충절)\n→ 'call + 사람 + names' = ~에게 욕을 하다\n→ it's not funny = 하나도 웃기지 않다"},
     {k:"아이들이 운동장에서 그녀에게 욕을 하고 있었다.",s:"The kids (주어) + were calling (과거진행) + her names (목적어+보어) + on the playground (장소 전치사구)\n→ 과거진행형으로 그 시간대에 계속 일어나던 행동을 표현\n→ on the playground = 운동장에서"}
   ]},
  {w:"charade",i:"/ʃəˈreɪd/",p:"n. [C]",m:"가식, 위장, 눈속임; (복수형) 몸짓 수수께끼 게임",c:"charade",
   e:["This whole meeting was just a charade — the decision was already made.","Their happy marriage was a complete charade."],
   x:[
     {k:"이 회의 전체가 그냥 눈속임이었어 — 결정은 이미 내려진 거였거든.",s:"This whole meeting (주어) + was (동사) + just a charade (보어) — the decision was already made (수동태 보충)\n→ just = 단지, 그냥\n→ was already made = 이미 결정되어 있었다 (수동태)"},
     {k:"그들의 행복한 결혼생활은 완전한 가식이었다.",s:"Their happy marriage (주어) + was (동사) + a complete charade (보어)\n→ complete = 완전한 (강조 형용사)\n→ charade = 겉으로만 그럴듯한 위장"}
   ]},
  {w:"chaperone",i:"/ˈʃæpərəʊn/",p:"n. [C]",m:"(행사에서 청소년을 감독하는) 보호자, 인솔 교사",c:"chaperone",

   x:[

     {k:"그 댄스 행사에는 최소 세 명의 인솔 보호자가 있어야 했다.",s:"The dance (주어) + required (동사) + at least three chaperones (목적어) + to be present (to부정사, 목적격 보어)\n→ 'require + 목적어 + to V' = ~가 …하도록 요구하다\n→ to be present = 참석해 있도록"}
   ]},
  {w:"circumstance",i:"/ˈsɜːrkəmstæns/",p:"n. [C]",m:"상황, 사정, 환경 — 주로 복수형 circumstances",c:"circumstance",
   e:["Under the circumstances, we had no choice but to leave.","The circumstances of his death remain unclear."],
   x:[
     {k:"그런 상황에서는 우리는 떠날 수밖에 없었어.",s:"Under the circumstances (전치사구, 문장 전체 수식) + we had no choice but to leave (주절)\n→ under the circumstances = 그런 사정에서\n→ 'have no choice but to V' = ~할 수밖에 없다"},
     {k:"그의 사망 경위는 여전히 불분명한 상태다.",s:"The circumstances of his death (주어) + remain (동사) + unclear (보어)\n→ remain + 형용사 = ~한 상태로 남아 있다\n→ of his death = 그의 죽음에 관한 (명사 수식)"}
   ]},
  {w:"comeuppance",i:"/kʌmˈʌpəns/",p:"n. [C/U]",m:"응당한 벌, 자업자득, 인과응보",c:"comeuppance",
   e:["He finally got his comeuppance after years of cheating people.","She deserved her comeuppance and everyone knew it."],
   x:[
     {k:"수년간 사람들을 속인 끝에 그는 마침내 자업자득의 결과를 맞았다.",s:"He (주어) + finally got (동사) + his comeuppance (목적어) + after years of cheating people (전치사구)\n→ get one's comeuppance = 당연한 벌을 받다\n→ after years of V-ing = 수년간 ~한 끝에"},
     {k:"그녀는 자업자득을 당해 마땅했고, 모두가 그걸 알고 있었다.",s:"She deserved her comeuppance (주절) + and everyone knew it (등위절)\n→ deserve = ~을 받을 자격이 있다, ~해 마땅하다\n→ it = her comeuppance를 가리키는 대명사"}
   ]},
  {w:"complicated",i:"/ˈkɒmplɪkeɪtɪd/",p:"adj.",m:"복잡한, 뒤얽힌",c:"complicated",
   e:["The relationship between them is very complicated.","This form is way too complicated — can you simplify it?"],

// ── Render ──────────────────────────────────────────
function letter(entry){ return entry.w[0].toUpperCase(); }

function camUrl(e){
  if(e.u) return e.u;
  if(e.c) return C + e.c;
  return null;
}

let activeSpeakBtn = null;

document.addEventListener('click', function(ev){
  const btn = ev.target.closest('.sp-btn');
  if(!btn){
    const item = ev.target.closest('.ex-item.clickable');
    if(item){
      const det = item.querySelector('.ex-detail');
      det.style.display = det.style.display === 'none' ? 'block' : 'none';
    }
    return;
  }
  const text = btn.dataset.text;
  if(window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    if(activeSpeakBtn){ activeSpeakBtn.classList.remove('on'); activeSpeakBtn.textContent='🔊'; }
    if(activeSpeakBtn === btn){ activeSpeakBtn = null; return; }
  }
  activeSpeakBtn = btn;
  btn.classList.add('on'); btn.textContent='■';
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US'; utt.rate = 0.88;
  utt.onend = utt.onerror = ()=>{ btn.classList.remove('on'); btn.textContent='🔊'; activeSpeakBtn=null; };
  window.speechSynthesis.speak(utt);
});

function entryHTML(e){
  const url = camUrl(e);
  const wordSpan = url
    ? `<span class="word"><a href="${url}" target="_blank">${e.w}</a></span>`
    : `<span class="word">${e.w}</span>`;
  const ipa = e.i ? `<span class="ipa">${e.i}</span>` : '';
  const camLink = url ? `<a class="cam-link" href="${url}" target="_blank">🔊 발음</a>` : '';
  const exItems = e.e.map((ex,i)=>{
    const det = e.x && e.x[i];
    const detHTML = det ? `<div class="ex-detail" style="display:none"><div class="ex-ko">${det.k}</div><div class="ex-str">${det.s}</div></div>` : '';
    return `
    <li class="ex-item${det?' clickable':''}">
      <span class="ex-dot">›</span>
      <div class="ex-body">
        <div class="ex-row">
          <span class="ex-text">${ex}</span>
          <button class="sp-btn" data-text="${ex.replace(/"/g,'&quot;')}">🔊</button>
        </div>
        ${detHTML}
      </div>
    </li>`;
  }).join('');
  const note = e.n ? `<div class="note">${e.n}</div>` : '';
  return `
  <div class="entry" data-w="${e.w.toLowerCase()}" data-m="${e.m.toLowerCase()}">
    <div class="erow1">${wordSpan}${ipa}<span class="pos">${e.p}</span>${camLink}</div>
    <div class="meaning">${e.m}</div>
    <ul class="examples">${exItems}</ul>
    ${note}
  </div>`;
}

function render(data){
  const groups = {};
  data.forEach(e=>{ const l=letter(e); (groups[l]=groups[l]||[]).push(e); });
  const letters = Object.keys(groups).sort();

  document.getElementById('cnt').textContent = data.length + '개';
  document.getElementById('anav').innerHTML = letters.map(l=>
    `<a href="#L${l}">${l}</a>`).join('');

  const main = document.getElementById('main');
  if(!data.length){ main.innerHTML='<div class="empty">검색 결과가 없어요 😅</div>'; return; }
  main.innerHTML = letters.map(l=>`
    <section class="section" id="L${l}">
      <div class="sec-head">
        <div class="letter-box">${l}</div>
        <span class="sec-count">${groups[l].length}개</span>
      </div>
      ${groups[l].map(entryHTML).join('')}
    </section>`).join('');
}

document.getElementById('search').addEventListener('input', function(){
  const q = this.value.toLowerCase().trim();
  if(!q){ render(V); return; }
  render(V.filter(e=>
    e.w.toLowerCase().includes(q) ||
    e.m.toLowerCase().includes(q) ||
    (e.i||'').includes(q) ||
    e.e.some(x=>x.toLowerCase().includes(q))
  ));
});

render(V);
</script>
